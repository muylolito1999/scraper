name: Scrape FIR officials

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Season (YYYY/YYYY)"
        required: true
        default: "2025/2026"
      date:
        description: "Date or range (DD/MM/YYYY or DD/MM/YYYY-DD/MM/YYYY)"
        required: false
        default: "01/05/2026-03/05/2026"
      provinces:
        description: "Comma-separated province codes (leave empty for default Emilia-Romagna)"
        required: false
        default: ""
      delay:
        description: "Delay between API requests in ms"
        required: false
        default: "500"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Compute artifact name
        id: meta
        run: |
          slug="$(echo '${{ inputs.season }}' | tr '/' '-')"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      - name: Run scraper
        run: |
          ARGS=(--season "${{ inputs.season }}" --out output.csv --delay "${{ inputs.delay }}")
          if [ -n "${{ inputs.date }}" ]; then
            ARGS+=(--date "${{ inputs.date }}")
          fi
          if [ -n "${{ inputs.provinces }}" ]; then
            ARGS+=(--provinces "${{ inputs.provinces }}")
          fi
          npm start -- "${ARGS[@]}"

      - name: Show output preview
        if: always()
        run: |
          if [ -f output.csv ]; then
            echo "=== Row count ==="
            wc -l output.csv
            echo "=== First 50 lines ==="
            head -n 50 output.csv
          else
            echo "output.csv was not produced"
          fi

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fir-officials-${{ steps.meta.outputs.slug }}-${{ github.run_id }}
          path: output.csv
          if-no-files-found: warn
